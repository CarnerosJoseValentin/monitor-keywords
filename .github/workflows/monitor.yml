name: Monitor keywords hourly

on:
  schedule:
    - cron: "0 * * * *"   # cada hora
  workflow_dispatch:

# Evita solapamientos (por si un run tarda más de 1h)
concurrency:
  group: monitor-keywords-hourly
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Intentar descargar el estado previo. Si todavía no existe, no pasa nada.
      - name: Download previous state (artifact)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: monitor-state
          path: .

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_SNIPPET_CHARS: "300"
          RETENTION_DAYS: "30"
        run: |
          python src/monitor.py

      - name: Upload updated state (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: monitor-state
          path: state.json
          if-no-files-found: error
          retention-days: 30