name: Keyword Monitor

on:
  schedule:
    # Corre cada hora, en el minuto 0
    - cron: "0 * * * *"
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Inyecta los feeds de Google Alerts desde Secrets hacia feeds.txt
      # Solo agrega los que están configurados (los vacíos se ignoran)
      - name: Inject Google Alert feeds
        env:
          FEED_1: ${{ secrets.GOOGLE_ALERT_FEED_1 }}
          FEED_2: ${{ secrets.GOOGLE_ALERT_FEED_2 }}
          FEED_3: ${{ secrets.GOOGLE_ALERT_FEED_3 }}
        run: |
          echo "" >> feeds.txt
          echo "# --- Google Alerts (inyectados desde Secrets) ---" >> feeds.txt
          [ -n "$FEED_1" ] && echo "$FEED_1" >> feeds.txt || true
          [ -n "$FEED_2" ] && echo "$FEED_2" >> feeds.txt || true
          [ -n "$FEED_3" ] && echo "$FEED_3" >> feeds.txt || true

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RETENTION_DAYS: 30
          MAX_SNIPPET_CHARS: 300
        run: python src/monitor.py

      # Persiste el state.json para mantener la deduplicación entre ejecuciones
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
