name: Monitor keywords hourly

on:
  schedule:
    - cron: "0 * * * *"   # cada hora
  workflow_dispatch:

# Evita solapamientos (por si un run tarda más de 1h)
concurrency:
  group: monitor-keywords-hourly
  cancel-in-progress: false

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Intentar descargar el estado previo. 
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Download previous state from latest successful run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # Busca el último run exitoso del workflow actual
          RUN_ID=$(gh run list --workflow "monitor.yml" --branch "${GITHUB_REF_NAME}" --status success --limit 1 --json databaseId -q '.[0].databaseId' || true)
          if [ -n "${RUN_ID}" ]; then
            echo "Last successful run id: ${RUN_ID}"
            # Descarga el artifact monitor-state de ese run
            gh run download "${RUN_ID}" -n monitor-state --dir .
            ls -la state.json || true
          else
            echo "No previous successful runs found."
          fi

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAX_SNIPPET_CHARS: "300"
          RETENTION_DAYS: "30"
        run: |
          python src/monitor.py

      - name: Upload updated state (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: monitor-state
          path: state.json
          if-no-files-found: error
          retention-days: 30
